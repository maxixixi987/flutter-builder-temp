name: Build APK

on:
  workflow_dispatch:
    inputs:
      project_zip_url:
        description: 'URL ZIP project'
        required: true
        type: string
      project_type:
        description: 'flutter or android'
        required: true
        default: 'flutter'
        type: choice
        options:
          - flutter
          - android
      build_type:
        description: 'debug or release'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download project ZIP
        run: |
          cd /home/runner/work/_temp
          wget -O project.zip "${{ github.event.inputs.project_zip_url }}"
          mkdir -p project
          unzip -o project.zip -d project/
          ls -la project/

      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        if: github.event.inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-35 build-tools;34.0.0'
      
      - name: Build Flutter APK
        if: github.event.inputs.project_type == 'flutter'
        run: |
          # Kita masuk ke folder work_dir yang udah dibuat pas download ZIP
          cd work_dir
          
          # Cek isi folder biar kita nggak ketipu
          ls -R
          
          flutter pub get
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi
          ls -la build/app/outputs/flutter-apk/

      
      - name: Build Android APK
        if: github.event.inputs.project_type == 'android'
        run: |
          cd /home/runner/work/_temp/project
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || ls -la app/build/outputs/apk/release/
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            /home/runner/work/_temp/project/build/app/outputs/flutter-apk/*.apk
            /home/runner/work/_temp/project/app/build/outputs/apk/debug/*.apk
            /home/runner/work/_temp/project/app/build/outputs/apk/release/*.apk
          compression-level: 0
